name: Linting Checks

on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/eclipse-score/devcontainer:v1.2.0
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Run Linter Script
        run: |
          su -l vscode -c 'uv tool install pre-commit && cd /home/vscode/workspaces/docs-as-code && git config --global --add safe.directory /home/vscode/workspaces/docs-as-code && pre-commit run -a'
        #run: su vscode && pre-commit
